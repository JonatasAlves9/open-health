services:
  api:
    image: ghcr.io/jonatasalves9/open-health-api:latest
    restart: unless-stopped
    volumes:
      - api-data:/data
    environment:
      NODE_ENV: production
      DATABASE_URL: /data/open-health.db
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

  frontend:
    image: ghcr.io/jonatasalves9/open-health-frontend:latest
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      API_URL: http://api:3001
    depends_on:
      - api

volumes:
  api-data:
